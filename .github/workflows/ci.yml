name: ci

on:
  push:
    branches: ["main", "hardening/**"]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy openhip apps/api

      - name: Test
        run: pytest -q

      - name: Demo and evidence checks
        run: |
          python -m openhip.cli incident-demo
          python -m openhip.cli replay-incident
          python -m openhip.cli verify-warehouse
          python -m openhip.cli verify-replay-invariants
          python -m openhip.cli export-incident-report

      - name: Build technical docs
        run: mkdocs build --strict

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build flagship web site
        working-directory: apps/web
        run: |
          npm install
          npm run typecheck
          npm run build

  pages:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Next.js flagship site for GitHub Pages
        working-directory: apps/web
        env:
          GITHUB_PAGES: "true"
        run: |
          npm install
          npm run typecheck
          npm run build

      - name: Upload Next.js static export
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - id: deployment
        uses: actions/deploy-pages@v4
