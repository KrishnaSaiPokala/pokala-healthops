site_name: Pokala HealthOps
site_description: Healthcare Interface Operations Platform
site_url: https://krishnasaipokala.github.io/pokala-healthops/
repo_url: https://github.com/KrishnaSaiPokala/pokala-healthops
repo_name: KrishnaSaiPokala/pokala-healthops
copyright: Built by Krishna Sai Pokala · Synthetic data only · No PHI

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

extra_css:
  - styles.css

markdown_extensions:
  - attr_list
  - md_in_html
  - tables

nav:
  - Command Center: index.md
  - Architecture: architecture.md
  - Incident Demo: incident-demo.md
  - Evidence: evidence.md
  - Security: security.md
  - Interview Story: interview.md
