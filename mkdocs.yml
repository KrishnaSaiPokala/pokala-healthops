site_name: Pokala HealthOps
site_description: Local-first no-PHI healthcare interface reliability demo
site_url: https://krishnasaipokala.github.io/pokala-healthops/
repo_url: https://github.com/KrishnaSaiPokala/pokala-healthops
repo_name: KrishnaSaiPokala/pokala-healthops
copyright: Built by Krishna Sai Pokala · Synthetic data only · No PHI

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

extra_css:
  - styles.css

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - pymdownx.superfences

nav:
  - Command Center: index.md
  - Architecture: architecture.md
  - Incident Demo: incident-demo.md
  - Evidence: evidence.md
  - Contracts: contracts.md
  - Observability: observability.md
  - Public Data: public-data.md
  - Data Strategy: data-strategy.md
  - Security: security.md
  - Run Locally: run-locally.md
  - Runbooks:
      - Terminology Map Failure: runbooks/terminology-map-failure.md
  - ADRs:
      - Local-first and no PHI: adr/0001-local-first-no-phi.md
      - Explicit replay: adr/0002-explicit-replay.md
  - Roadmap: roadmap.md
