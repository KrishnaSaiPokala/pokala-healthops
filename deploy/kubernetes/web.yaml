apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthops-web
  namespace: healthops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthops-web
  template:
    metadata:
      labels:
        app: healthops-web
    spec:
      containers:
        - name: web
          image: healthops-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: healthops-web
  namespace: healthops
spec:
  selector:
    app: healthops-web
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
  type: NodePort
