apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthops-web
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthops-web
  template:
    metadata:
      labels:
        app: healthops-web
    spec:
      containers:
        - name: web
          image: {{ .Values.web.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: healthops-web
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: healthops-web
  ports:
    - port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
      nodePort: {{ .Values.web.nodePort }}
