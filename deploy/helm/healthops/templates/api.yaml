apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthops-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthops-api
  template:
    metadata:
      labels:
        app: healthops-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: HEALTHOPS_ENV
              value: local
            - name: HEALTHOPS_DATABASE_URL
              value: sqlite:///./healthops.db
            - name: OTEL_SERVICE_NAME
              value: healthops-api
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: healthops-api
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: healthops-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      nodePort: {{ .Values.api.nodePort }}
