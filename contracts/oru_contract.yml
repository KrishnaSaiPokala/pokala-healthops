interface: lab_oru_feed
version: "1.0"
message_type: ORU
owner: InterfaceOps demo
required_fields:
  - patient_mrn
  - patient_dob
  - encounter_id
  - observation_code
  - observation_value
  - observation_unit
  - observation_datetime
  - ordering_provider_id
field_rules:
  observation_datetime:
    type: datetime
    cannot_be_future: true
  observation_code:
    type: string
    mapping_required: true
sla:
  max_reject_rate: 0.02
affected_assets:
  - stg_observation
  - fact_observation
  - lab_operations_dashboard
